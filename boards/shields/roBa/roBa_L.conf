CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_POINTING=y

# Enable Prospector Status Advertisement (GitHub Actions compatible)
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_INTERVAL_MS=1000
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="roBa"

# Note: Activity-based features require prospector-zmk-module to be loaded
# For local development with west.yml, the advanced features are available
# For GitHub Actions, we use basic fixed-interval advertisement