# Activity-based advertisement configuration for local development
# This file can be used when prospector-zmk-module is available via west.yml

# Enable activity-based advertisement control (power efficient)
CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y
CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=500
CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=2000
CONFIG_ZMK_STATUS_ADV_STOP_ON_SLEEP=y

# Override the basic interval setting
CONFIG_ZMK_STATUS_ADV_INTERVAL_MS=1000